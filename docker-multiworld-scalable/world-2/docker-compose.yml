services:
    world:
        build:
            context: ../../
            dockerfile: docker-multiworld-scalable/${WORLD_DIRECTORY}/Dockerfile
        container_name: ${WORLD_DIRECTORY}
        hostname: ${WORLD_DIRECTORY}
        env_file:
            - ./.env
        volumes:
            - ./.env:/app/.env:ro
        command: yarn workspace @acacia/server start --host 0.0.0.0 --port ${PORT}
        expose:
            - '${PORT}'
            - '${API_PORT}'
        ports:
            - '${PUBLIC_GAME_PORT}:${PORT}'
            - '${PUBLIC_API_PORT}:${API_PORT}'
        networks:
            scalable:
                aliases:
                    - ${WORLD_DIRECTORY}
                    - world-${SERVER_ID}

networks:
    scalable:
        external: true
        name: acacia-scalable-runtime
