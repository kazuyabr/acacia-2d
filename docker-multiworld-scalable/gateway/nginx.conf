worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    resolver 127.0.0.11 ipv6=off valid=5s;
    resolver_timeout 5s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name localhost;

        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Ssl $http_x_forwarded_ssl;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        location @client_upstream {
            set $service_host client;
            set $service_port 9000;
            proxy_pass http://$service_host:$service_port;
            proxy_http_version 1.1;
        }

        location @hub_api_upstream {
            set $service_host hub;
            set $service_port 9526;
            proxy_pass http://$service_host:$service_port;
        }

        location @hub_ws_upstream {
            set $service_host hub;
            set $service_port 9527;
            proxy_pass http://$service_host:$service_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300s;
        }

        location @world_ws_upstream {
            proxy_pass http://$service_host:$service_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300s;
        }

        location = /server {
            try_files "" @hub_api_upstream;
        }

        location = /all {
            try_files "" @hub_api_upstream;
        }

        location = /leaderboards {
            try_files "" @hub_api_upstream;
        }

        location = /isOnline {
            try_files "" @hub_api_upstream;
        }

        location /api/ {
            try_files "" @hub_api_upstream;
        }

        location /ws {
            set $service_host $arg_host;
            set $service_port $arg_port;

            if ($arg_serverId != '') {
                set $service_host world-$arg_serverId;
            }

            if ($service_host = '') {
                return 400;
            }

            if ($service_port = '') {
                return 400;
            }

            proxy_pass http://$service_host:$service_port;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 300s;
        }

        location /hub/ws {
            try_files "" @hub_ws_upstream;
        }

        location / {
            try_files "" @client_upstream;
        }
    }
}
